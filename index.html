<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud Digital - Previnca Salud</title>
    <style>
        :root { --primary-blue: #004581; --accent-green: #28a745; --text-white: #ffffff; --bg-body: #e9ecef; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-body); margin: 0; padding: 20px; }
        .container { background: white; max-width: 650px; margin: auto; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { text-align: center; padding: 25px; background: white; }
        .header h1 { color: var(--primary-blue); margin: 0; font-size: 28px; text-transform: uppercase; letter-spacing: 1px; }
        .header p { color: #666; font-weight: 600; margin: 5px 0 0; }
        .bloque-azul { background-color: var(--primary-blue); color: var(--text-white); padding: 25px; margin: 15px; border-radius: 12px; }
        .bloque-titulo { font-size: 16px; font-weight: bold; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 600; margin-bottom: 5px; text-transform: uppercase; opacity: 0.9; }
        input, select { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px; box-sizing: border-box; background: white; color: #333; }
        .chip-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .chip { padding: 8px 15px; border: 1px solid rgba(255,255,255,0.4); border-radius: 20px; cursor: pointer; font-size: 13px; background: rgba(255,255,255,0.1); transition: 0.3s; user-select: none; }
        .chip.selected { background: var(--accent-green); border-color: var(--accent-green); font-weight: bold; }
        .input-extra { margin-top: 10px; display: none; background: #fff; color: #333; }
        .btn-verde { background-color: var(--accent-green); color: white; border: none; padding: 20px; width: calc(100% - 30px); margin: 0 15px 20px 15px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-geo { background: white; color: var(--primary-blue); border: none; border-radius: 8px; padding: 0 10px; cursor: pointer; font-size: 18px; height: 45px; min-width: 50px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>PREVINCA SALUD</h1>
        <p>Solicitud de Afiliación Digital</p>
    </div>

    <div id="mainForm">
        <div class="bloque-azul">
            <div class="bloque-titulo">1. Datos Personales</div>
            <div class="form-group">
                <label>ID Vendedor / Promotor *</label>
                <input type="text" id="idVendedor" placeholder="Su código de vendedor">
            </div>
            <div class="form-group">
                <label>Tipo de Afiliación</label>
                <select id="tipoAfiliacion">
                    <option value="Solo Titular">Solo Titular</option>
                    <option value="Grupo Familiar">Grupo Familiar</option>
                </select>
            </div>
            <div class="grid">
                <div class="form-group"><label>DNI</label><input type="number" id="dni"></div>
                <div class="form-group"><label>Fecha Nacimiento</label><input type="date" id="fechaNac"></div>
            </div>
            <div class="grid">
                <div class="form-group"><label>Apellido</label><input type="text" id="apellido"></div>
                <div class="form-group"><label>Nombre</label><input type="text" id="nombre"></div>
            </div>
            <div class="form-group">
                <label>Dirección (Domicilio)</label>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="domicilio" placeholder="Calle y número">
                    <button type="button" class="btn-geo" onclick="obtenerUbicacion()">📍</button>
                </div>
            </div>
            <div class="grid">
                <div class="form-group"><label>Localidad</label><input type="text" id="localidad"></div>
                <div class="form-group"><label>Cód. Postal</label><input type="text" id="cp"></div>
            </div>
            <div class="grid">
                <div class="form-group"><label>Celular</label><input type="tel" id="celular"></div>
                <div class="form-group"><label>Email</label><input type="email" id="email"></div>
            </div>
            <div class="form-group">
                <label>Obra Social</label>
                <select id="obraSocial">
                    <option value="Particular (No tiene)">Particular (No tiene)</option>
                    <option value="PAMI">PAMI</option><option value="IOMA">IOMA</option><option value="OSDE">OSDE</option>
                    <option value="Otra">Otra Obra Social</option>
                </select>
            </div>
        </div>

        <div class="bloque-azul">
            <div class="bloque-titulo">2. Antecedentes de Salud</div>
            
            <div class="form-group">
                <label>¿Toma Medicación Diaria?</label>
                <select id="tomaMedicacion" onchange="document.getElementById('medExtra').style.display = (this.value=='Sí'?'block':'none')">
                    <option value="No">No</option>
                    <option value="Sí">Sí</option>
                </select>
                <input type="text" id="medExtra" class="input-extra" placeholder="¿Qué medicación toma?">
            </div>

            <div class="form-group">
                <label>¿Tuvo Internación o Cirugía?</label>
                <select id="tuvoInternacion" onchange="document.getElementById('intExtra').style.display = (this.value=='Sí'?'block':'none')">
                    <option value="No">No</option>
                    <option value="Sí">Sí</option>
                </select>
                <input type="text" id="intExtra" class="input-extra" placeholder="¿Cuándo y dónde?">
            </div>

            <label>Alergias</label>
            <div class="chip-group" id="alergiaChips">
                <div class="chip" onclick="toggleChip(this, 'alergiaExtra')">Medicamentos</div>
                <div class="chip" onclick="toggleChip(this, 'alergiaExtra')">Alimentos</div>
                <div class="chip" onclick="toggleChip(this, 'alergiaExtra')">Picaduras</div>
                <div class="chip" onclick="toggleChip(this, 'alergiaExtra')">Otra</div>
                <div class="chip" onclick="toggleChip(this, 'alergiaExtra')">Ninguna</div>
            </div>
            <input type="text" id="alergiaExtra" class="input-extra" placeholder="Especifique alergia...">

            <label style="margin-top:20px; display:block;">Enfermedades Crónicas</label>
            <div class="chip-group" id="cronicaChips">
                <div class="chip" onclick="toggleChip(this, 'cronicaExtra')">Diabetes</div>
                <div class="chip" onclick="toggleChip(this, 'cronicaExtra')">Hipertensión</div>
                <div class="chip" onclick="toggleChip(this, 'cronicaExtra')">Asma</div>
                <div class="chip" onclick="toggleChip(this, 'cronicaExtra')">Otra</div>
                <div class="chip" onclick="toggleChip(this, 'cronicaExtra')">Ninguna</div>
            </div>
            <input type="text" id="cronicaExtra" class="input-extra" placeholder="Especifique enfermedad...">
        </div>

        <div class="bloque-azul">
            <div class="bloque-titulo">3. Plan y Pago</div>
            <div class="grid">
                <div class="form-group">
                    <label>Plan</label>
                    <select id="plan"><option value="Plan Global">Plan Global</option><option value="Plan Vital">Plan Vital</option></select>
                </div>
                <div class="form-group">
                    <label>Pago</label>
                    <select id="pago"><option value="Débito">Débito Automático</option><option value="Efectivo">Efectivo</option></select>
                </div>
            </div>
        </div>

        <button class="btn-verde" onclick="enviar()">Enviar Solicitud Final</button>
    </div>

    <div id="success" class="hidden" style="text-align:center; padding:60px 20px; color:var(--primary-blue);">
        <h2>¡Enviado con Éxito!</h2>
        <p>Gracias por confiar en Previnca Salud.</p>
        <button onclick="location.reload()" style="margin-top:20px; cursor:pointer; padding:10px; border-radius:8px;">Cargar otra</button>
    </div>
</div>

<script>
    function toggleChip(el, extraId) {
        if(el.innerText === 'Ninguna') {
            Array.from(el.parentElement.children).forEach(c => c.classList.remove('selected'));
            document.getElementById(extraId).style.display = 'none';
        } else {
            const ninguna = Array.from(el.parentElement.children).find(c => c.innerText === 'Ninguna');
            if(ninguna) ninguna.classList.remove('selected');
        }
        el.classList.toggle('selected');
        
        const tieneOtra = Array.from(el.parentElement.querySelectorAll('.chip.selected')).some(c => c.innerText === 'Otra');
        document.getElementById(extraId).style.display = tieneOtra ? 'block' : 'none';
    }

    function obtenerUbicacion() {
        if (!navigator.geolocation) return alert("No soportado");
        navigator.geolocation.getCurrentPosition(async (pos) => {
            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${pos.coords.latitude}&lon=${pos.coords.longitude}`);
                const d = await res.json();
                document.getElementById('domicilio').value = (d.address.road || "") + " " + (d.address.house_number || "");
                document.getElementById('localidad').value = d.address.city || d.address.town || d.address.village || "";
                document.getElementById('cp').value = d.address.postcode || "";
            } catch (e) { alert("Error al geolocalizar"); }
        });
    }

    async function enviar() {
        const btn = document.querySelector('.btn-verde');
        btn.textContent = 'Enviando Datos...';
        btn.disabled = true;

        try {
            let alergias = Array.from(document.querySelectorAll('#alergiaChips .selected')).map(c => c.innerText).join(', ');
            if(alergias.includes('Otra')) alergias += " (" + document.getElementById('alergiaExtra').value + ")";

            let cronicas = Array.from(document.querySelectorAll('#cronicaChips .selected')).map(c => c.innerText).join(', ');
            if(cronicas.includes('Otra')) cronicas += " (" + document.getElementById('cronicaExtra').value + ")";

            const formData = new URLSearchParams();
            formData.append('id_vendedor', document.getElementById('idVendedor').value);
            formData.append('tipo_afiliacion', document.getElementById('tipoAfiliacion').value);
            formData.append('dni', document.getElementById('dni').value);
            formData.append('apellido', document.getElementById('apellido').value);
            formData.append('nombre', document.getElementById('nombre').value);
            formData.append('fecha_nacimiento', document.getElementById('fechaNac').value);
            formData.append('domicilio', document.getElementById('domicilio').value);
            formData.append('localidad', document.getElementById('localidad').value);
            formData.append('cp', document.getElementById('cp').value);
            formData.append('celular', document.getElementById('celular').value);
            formData.append('mail', document.getElementById('email').value);
            formData.append('obra_social', document.getElementById('obraSocial').value);
            formData.append('medicacion', document.getElementById('tomaMedicacion').value === 'Sí' ? document.getElementById('medExtra').value : 'No');
            formData.append('internacion', document.getElementById('tuvoInternacion').value === 'Sí' ? document.getElementById('intExtra').value : 'No');
            formData.append('alergia', alergias || 'Ninguna');
            formData.append('enfermedad_cronica', cronicas || 'Ninguna');
            formData.append('plan', document.getElementById('plan').value);
            formData.append('pago', document.getElementById('pago').value);
            formData.append('fecha_envio', new Date().toLocaleString());

            const scriptURL = 'https://script.google.com/macros/library/d/1NynC3iv2-Q_KEt4L_dJYuIC5bzwvVzea-GwcmNhMj7Mr4zJ95z_BMHSa/17;

            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: formData });
            document.getElementById('mainForm').classList.add('hidden');
            document.getElementById('success').classList.remove('hidden');
            window.scrollTo(0,0);
        } catch (e) {
            alert("Error al enviar. Verifique su conexión.");
            btn.disabled = false;
            btn.textContent = 'Enviar Solicitud Final';
        }
    }
</script>
</body>
</html>
