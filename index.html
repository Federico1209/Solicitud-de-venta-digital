<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud Digital - Previnca Salud</title>
    <style>
        :root { --primary: #1B3A6B; --accent: #0F766E; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 600px; margin: auto; }
        .header { text-align: center; border-bottom: 2px solid var(--accent); margin-bottom: 20px; padding-bottom: 10px; }
        .header h1 { color: var(--primary); margin: 0; font-size: 24px; }
        
        /* Estilo de Bloques */
        .bloque { border: 1px solid #e2e8f0; padding: 20px; border-radius: 12px; margin-bottom: 25px; background: #fff; }
        .bloque-titulo { font-weight: bold; color: var(--primary); font-size: 14px; text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #f1f5f9; padding-bottom: 5px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-weight: 600; margin-bottom: 4px; font-size: 12px; color: #64748b; }
        input, select { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
        
        /* Estilo de Chips */
        .chip-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
        .chip { padding: 7px 14px; border: 1px solid #cbd5e1; border-radius: 20px; cursor: pointer; font-size: 13px; background: #f8fafc; transition: 0.2s; }
        .chip.selected { background: var(--primary); color: white; border-color: var(--primary); }
        
        .btn-submit { background: var(--primary); color: white; border: none; padding: 16px; width: 100%; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .hidden { display: none; }
        @media (max-width: 500px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>PREVINCA SALUD</h1>
        <p style="font-size: 12px; color: var(--accent); font-weight: bold; margin: 5px 0;">SOLICITUD DE AFILIACIÓN</p>
    </div>

    <div id="formContent">
        <div class="bloque">
            <div class="bloque-titulo">👤 1. Datos Personales</div>
            
            <div class="form-group">
                <label>Titular / Grupo Familiar</label>
                <select id="tipoAfiliacion">
                    <option value="Solo Titular">Solo Titular</option>
                    <option value="Grupo Familiar">Grupo Familiar</option>
                </select>
            </div>

            <div class="grid">
                <div class="form-group"><label>DNI *</label><input type="number" id="dni"></div>
                <div class="form-group"><label>Fecha Nacimiento *</label><input type="date" id="fechaNac"></div>
            </div>

            <div class="grid">
                <div class="form-group"><label>Apellido *</label><input type="text" id="apellido"></div>
                <div class="form-group"><label>Nombre *</label><input type="text" id="nombre"></div>
            </div>

            <div class="form-group"><label>Dirección (Calle y Nro) *</label><input type="text" id="domicilio"></div>

            <div class="grid">
                <div class="form-group"><label>Localidad *</label><input type="text" id="localidad"></div>
                <div class="form-group"><label>Cód. Postal *</label><input type="text" id="cp"></div>
            </div>

            <div class="grid">
                <div class="form-group"><label>Celular *</label><input type="tel" id="celular"></div>
                <div class="form-group"><label>Email *</label><input type="email" id="email"></div>
            </div>

            <div class="form-group">
                <label>Obra Social *</label>
                <select id="obraSocial">
                    <option value="No tiene / Particular">No tiene / Particular</option>
                    <option value="PAMI">PAMI</option>
                    <option value="IOMA">IOMA</option>
                    <option value="OSDE">OSDE</option>
                    <option value="Swiss Medical">Swiss Medical</option>
                    <option value="OSECAC">OSECAC</option>
                    <option value="Galeno">Galeno</option>
                    <option value="Medicus">Medicus</option>
                    <option value="Sancor Salud">Sancor Salud</option>
                    <option value="Otra">Otra (Monotributo / Otros)</option>
                </select>
            </div>
        </div>

        <div class="bloque">
            <div class="bloque-titulo">🏥 2. Antecedentes de Salud</div>
            
            <label>¿Presenta Alergias? (Seleccione)</label>
            <div class="chip-group" id="alergiaChips">
                <div class="chip" onclick="toggleChip(this)">Medicamentos</div>
                <div class="chip" onclick="toggleChip(this)">Alimentos</div>
                <div class="chip" onclick="toggleChip(this)">Picaduras</div>
                <div class="chip" onclick="toggleChip(this)">Polen</div>
                <div class="chip" onclick="toggleChip(this)">Animales</div>
                <div class="chip" onclick="toggleChip(this)">Ninguna</div>
            </div>

            <label style="margin-top: 15px; display: block;">¿Enfermedades Crónicas? (Seleccione)</label>
            <div class="chip-group" id="cronicaChips">
                <div class="chip" onclick="toggleChip(this)">Diabetes</div>
                <div class="chip" onclick="toggleChip(this)">Hipertensión</div>
                <div class="chip" onclick="toggleChip(this)">Asma</div>
                <div class="chip" onclick="toggleChip(this)">Tiroides</div>
                <div class="chip" onclick="toggleChip(this)">Cardíacas</div>
                <div class="chip" onclick="toggleChip(this)">Ninguna</div>
            </div>
        </div>

        <div class="bloque">
            <div class="bloque-titulo">💳 3. Plan y Modalidad de Pago</div>
            
            <div class="form-group">
                <label>Plan Seleccionado</label>
                <select id="plan">
                    <option value="Plan Global">Plan Global</option>
                    <option value="Plan Vital">Plan Vital</option>
                    <option value="Plan Integral">Plan Integral</option>
                    <option value="Plan Corporativo">Plan Corporativo</option>
                </select>
            </div>

            <div class="form-group">
                <label>Modalidad de Pago</label>
                <select id="pago">
                    <option value="Debito Automatico (CBU)">Débito Automático (CBU)</option>
                    <option value="Tarjeta de Credito">Tarjeta de Crédito</option>
                    <option value="Pago Mis Cuentas">Pago Mis Cuentas / Link</option>
                    <option value="Efectivo / Rapipago">Efectivo / Rapipago</option>
                </select>
            </div>
        </div>

        <button class="btn-submit" onclick="enviar()">ENVIAR SOLICITUD FINAL</button>
    </div>

    <div id="successScreen" class="hidden" style="text-align: center; padding: 40px 0;">
        <h2 style="color: var(--accent);">¡Solicitud Enviada!</h2>
        <p>Los datos se han procesado correctamente.</p>
        <button onclick="location.reload()" style="background: none; border: 1px solid #ccc; padding: 10px; border-radius: 5px; cursor: pointer;">Nueva Solicitud</button>
    </div>
</div>

<script>
    function toggleChip(el) {
        if(el.innerText === 'Ninguna') {
            Array.from(el.parentElement.children).forEach(c => c.classList.remove('selected'));
        } else {
            const ninguna = Array.from(el.parentElement.children).find(c => c.innerText === 'Ninguna');
            if(ninguna) ninguna.classList.remove('selected');
        }
        el.classList.toggle('selected');
    }

    async function enviar() {
        const btn = document.querySelector('.btn-submit');
        btn.textContent = 'Enviando...'; btn.disabled = true;

        const alergias = Array.from(document.querySelectorAll('#alergiaChips .selected')).map(c => c.innerText).join(', ');
        const cronicas = Array.from(document.querySelectorAll('#cronicaChips .selected')).map(c => c.innerText).join(', ');

        const formData = new URLSearchParams();
        formData.append('tipo_afiliacion', document.getElementById('tipoAfiliacion').value);
        formData.append('dni', document.getElementById('dni').value);
        formData.append('apellido', document.getElementById('apellido').value);
        formData.append('nombre', document.getElementById('nombre').value);
        formData.append('fecha_nacimiento', document.getElementById('fechaNac').value);
        formData.append('domicilio', document.getElementById('domicilio').value);
        formData.append('localidad', document.getElementById('localidad').value);
        formData.append('cp', document.getElementById('cp').value);
        formData.append('celular', document.getElementById('celular').value);
        formData.append('mail', document.getElementById('email').value);
        formData.append('obra_social', document.getElementById('obraSocial').value);
        formData.append('alergia', alergias || 'Ninguna');
        formData.append('enfermedad_cronica', cronicas || 'Ninguna');
        formData.append('plan', document.getElementById('plan').value);
        formData.append('pago', document.getElementById('pago').value);
        formData.append('fecha_envio', new Date().toLocaleString());

        // Asegúrate de usar tu URL de Apps Script aquí
        const scriptURL = 'TU_URL_DE_APPS_SCRIPT'; 

        try {
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: formData });
            document.getElementById('formContent').classList.add('hidden');
            document.getElementById('successScreen').classList.remove('hidden');
            window.scrollTo(0,0);
        } catch (err) {
            alert("Error al enviar. Intente nuevamente.");
            btn.disabled = false; btn.textContent = 'ENVIAR SOLICITUD FINAL';
        }
    }
</script>
</body>
</html>
