<script>
function submitForm() {
    const chk = document.getElementById('confirmCheck');
    if (!chk.checked) {
        chk.style.outline = '2px solid var(--red)';
        setTimeout(() => chk.style.outline = '', 2000);
        return;
    }

    const btn = document.querySelector('.btn-submit');
    btn.textContent = 'Enviando...';
    btn.disabled = true;

    const formData = new URLSearchParams();
    // Agregamos los campos que recolecta tu diseño
    formData.append('dni', document.getElementById('dni').value);
    formData.append('apellido', document.getElementById('apellido').value);
    formData.append('nombre', document.getElementById('nombre').value);
    formData.append('fecha_nacimiento', document.getElementById('fechaNac').value);
    formData.append('domicilio', document.getElementById('domicilio').value);
    formData.append('localidad', document.getElementById('localidad').value);
    formData.append('codigo_postal', document.getElementById('cp').value);
    formData.append('celular', document.getElementById('celular').value);
    formData.append('mail', document.getElementById('email').value);
    formData.append('plan', document.getElementById('plan').value);
    // ... resto de los campos ...

    const sriptURL = 'https://script.google.com/macros/s/AKfycbyRD80bHzltVeqp8k17tacqqVcB4E1MOG9da6jxUf8/exec';

    fetch(sriptURL, {
        method: 'POST',
        mode: 'no-cors',
        body: formData
    })
    .then(() => {
        // Ejecuta la pantalla de éxito de tu diseño
        for (let i = 1; i <= 4; i++) document.getElementById('step' + i).style.display = 'none';
        document.getElementById('progressFill').style.width = '100%';
        document.getElementById('successScreen').classList.add('show');
        document.getElementById('successID').textContent = solicitudID;
    })
    .catch(error => {
        alert('Error al enviar: ' + error.message);
        btn.textContent = 'Reintentar';
        btn.disabled = false;
    });
}
</script>
