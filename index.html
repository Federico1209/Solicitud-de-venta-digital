<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud Digital - Previnca Salud</title>
    <style>
        :root { --primary-blue: #004581; --accent-green: #28a745; --text-white: #ffffff; --bg-body: #e9ecef; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-body); margin: 0; padding: 10px; }
        .container { background: white; max-width: 600px; margin: auto; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .header { text-align: center; padding: 20px; background: white; border-bottom: 3px solid var(--primary-blue); }
        .bloque-azul { background-color: var(--primary-blue); color: var(--text-white); padding: 20px; margin: 15px; border-radius: 12px; }
        .bloque-titulo { font-size: 16px; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 8px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 10px; font-weight: 600; margin-bottom: 4px; text-transform: uppercase; color: rgba(255,255,255,0.9); }
        input, select, textarea { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 14px; box-sizing: border-box; background: white; color: #333; }
        textarea { height: 80px; resize: none; font-family: inherit; }
        .chip-group { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 5px; }
        .chip { padding: 8px 12px; border: 1px solid rgba(255,255,255,0.3); border-radius: 15px; cursor: pointer; font-size: 12px; background: rgba(255,255,255,0.1); transition: 0.3s; user-select: none; }
        .chip.selected { background: var(--accent-green) !important; color: white !important; font-weight: bold; }
        .btn-verde { background-color: var(--accent-green); color: white; border: none; padding: 18px; width: calc(100% - 20px); margin: 10px; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .hidden { display: none; }
        .preview-img { width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px; margin-top: 10px; display: none; border: 2px solid white; }
        .adherente-card { background: rgba(255,255,255,0.15); padding: 15px; border-radius: 10px; margin-top: 15px; border: 1px dashed white; }
        .btn-adherente { background: #ffcc00; color: #004581; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; font-size: 14px; }
        .btn-eliminar { background: #ff4444; color: white; padding: 5px 10px; border: none; border-radius: 5px; cursor: pointer; font-size: 10px; float: right; }
        .checkbox-container { display: flex; align-items: flex-start; gap: 10px; background: #f8f9fa; color: #333; padding: 15px; border-radius: 10px; margin: 15px; border: 1px solid #ddd; }
        .checkbox-container label { color: #333; text-transform: none; font-size: 12px; font-weight: normal; line-height: 1.4; }
    </style>
</head>
<body>

<div class="container">
    <div class="header"><h1>PREVINCA SALUD</h1><p>Afiliación Digital</p></div>

    <div id="mainForm">
        <div class="bloque-azul">
            <div class="bloque-titulo">1. Datos Personales (Titular)</div>
            <div class="grid">
                <div class="form-group"><label>ID Vendedor *</label><input type="text" id="idVendedor"></div>
                <div class="form-group"><label>Tipo Afiliación</label>
                    <select id="tipoAfiliacion" onchange="toggleGrupoFamiliar()">
                        <option value="Solo Titular">Solo Titular</option>
                        <option value="Grupo Familiar">Grupo Familiar</option>
                    </select>
                </div>
            </div>
            <div class="grid">
                <div class="form-group"><label>DNI</label><input type="number" id="dniInput"></div>
                <div class="form-group"><label>Fecha Nacimiento</label><input type="date" id="fechaNac"></div>
            </div>
            <div class="grid">
                <div class="form-group"><label>Apellido</label><input type="text" id="apellido"></div>
                <div class="form-group"><label>Nombre</label><input type="text" id="nombre"></div>
            </div>
            <div class="form-group"><label>Dirección</label><input type="text" id="domicilio"></div>
            <div class="grid">
                <div class="form-group"><label>Localidad</label><input type="text" id="localidad"></div>
                <div class="form-group"><label>Cod Postal</label><input type="text" id="cp"></div>
            </div>
            <div class="grid">
                <div class="form-group"><label>Celular</label><input type="tel" id="celular"></div>
                <div class="form-group"><label>Email</label><input type="email" id="email"></div>
            </div>
            <div class="form-group"><label>Obra Social Titular</label><input type="text" id="obraSocial"></div>

            <div id="seccionAdherentes" class="hidden">
                <div id="listaAdherentes"></div>
                <button type="button" class="btn-adherente" onclick="agregarAdherente()">+ AGREGAR FAMILIAR ADHERENTE</button>
            </div>
        </div>

        <div class="bloque-azul">
            <div class="bloque-titulo">2. Salud (Titular)</div>
            <div class="form-group">
                <label>¿Toma medicación?</label>
                <select id="tomaMed" onchange="document.getElementById('medE').style.display=(this.value=='Sí'?'block':'none')"><option value="No">No</option><option value="Sí">Sí</option></select>
                <input type="text" id="medE" class="hidden" placeholder="¿Cuál?">
            </div>
            <div class="form-group">
                <label>¿Internaciones/Cirugías?</label>
                <select id="tuvoInt" onchange="document.getElementById('intE').style.display=(this.value=='Sí'?'block':'none')"><option value="No">No</option><option value="Sí">Sí</option></select>
                <input type="text" id="intE" class="hidden" placeholder="Detalle">
            </div>
            <label>Alergias</label>
            <div class="chip-group" id="alergiaChips">
                <div class="chip" onclick="toggleChip(this, 'otroAlergia')">Medicamentos</div>
                <div class="chip" onclick="toggleChip(this, 'otroAlergia')">Alimentos</div>
                <div class="chip" onclick="toggleChip(this, 'otroAlergia')">Ninguna</div>
                <div class="chip" onclick="toggleChip(this, 'otroAlergia')">Otro</div>
            </div>
            <input type="text" id="otroAlergia" class="hidden" placeholder="Especifique alergia">

            <label style="margin-top:10px; display:block">Enfermedades Crónicas</label>
            <div class="chip-group" id="cronicaChips">
                <div class="chip" onclick="toggleChip(this, 'otroCronica')">Diabetes</div>
                <div class="chip" onclick="toggleChip(this, 'otroCronica')">Hipertensión</div>
                <div class="chip" onclick="toggleChip(this, 'otroCronica')">Asma</div>
                <div class="chip" onclick="toggleChip(this, 'otroCronica')">Ninguna</div>
                <div class="chip" onclick="toggleChip(this, 'otroCronica')">Otro</div>
            </div>
            <input type="text" id="otroCronica" class="hidden" placeholder="Especifique enfermedad">
        </div>

        <div class="bloque-azul">
            <div class="bloque-titulo">3. Plan y Pago</div>
            <div class="grid">
                <div class="form-group"><label>Plan</label><select id="plan"><option>Global</option><option>Vital</option></select></div>
                <div class="form-group"><label>Pago</label><select id="pago"><option>Débito</option><option>Efectivo</option></select></div>
            </div>
            <textarea id="observacionesInput" placeholder="Notas adicionales..."></textarea>
            <div class="form-group" style="margin-top:10px">
                <label>Foto DNI Titular</label>
                <input type="file" id="fotoInput" accept="image/*" onchange="previsualizar(this)">
                <img id="imgPreview" class="preview-img">
            </div>
        </div>

        <div class="checkbox-container">
            <input type="checkbox" id="aceptaTerminos">
            <label for="aceptaTerminos">
                Declaro bajo juramento que los datos son verídicos. 
                Acepto los <a href="https://drive.google.com/file/d/1RraQ6EktGUvKIv_f0yxvvux0ktjjOeGH/view" target="_blank">Términos y Condiciones</a>.
            </label>
        </div>

        <button class="btn-verde" id="btnEnviar" onclick="enviarSolicitud()">Enviar Solicitud Final</button>
    </div>

    <div id="success" class="hidden" style="text-align:center; padding:50px; color:var(--primary-blue);">
        <h2>¡Enviado con Éxito!</h2>
        <button onclick="location.reload()">Nueva Carga</button>
    </div>
</div>

<script>
    let fotoBase64 = "", fotoNombre = "", fotoMime = "";

    function toggleGrupoFamiliar() {
        const tipo = document.getElementById('tipoAfiliacion').value;
        document.getElementById('seccionAdherentes').classList.toggle('hidden', tipo !== "Grupo Familiar");
    }

    function agregarAdherente() {
        const contenedor = document.getElementById('listaAdherentes');
        const div = document.createElement('div');
        div.className = 'adherente-card';
        div.innerHTML = `
            <button type="button" class="btn-eliminar" onclick="this.parentElement.remove()">X</button>
            <p style="color:#ffcc00; font-weight:bold; font-size:12px">FAMILIAR ADHERENTE</p>
            <div class="grid">
                <div class="form-group"><label>DNI</label><input type="number" class="adh-dni"></div>
                <div class="form-group"><label>F. Nac</label><input type="date" class="adh-fnac"></div>
            </div>
            <div class="grid">
                <div class="form-group"><label>Apellido</label><input type="text" class="adh-apellido"></div>
                <div class="form-group"><label>Nombre</label><input type="text" class="adh-nombre"></div>
            </div>
            <div class="grid">
                <div class="form-group"><label>Celular</label><input type="tel" class="adh-tel"></div>
                <div class="form-group"><label>Email</label><input type="email" class="adh-mail"></div>
            </div>
            <div class="form-group"><label>Obra Social</label><input type="text" class="adh-os"></div>
            <textarea class="adh-salud" placeholder="Antecedentes de salud..."></textarea>
        `;
        contenedor.appendChild(div);
    }

    function toggleChip(el, inputId) {
        if (el.innerText === "Ninguna") {
            Array.from(el.parentElement.children).forEach(c => c.classList.remove('selected'));
        } else {
            const ning = Array.from(el.parentElement.children).find(c => c.innerText === "Ninguna");
            if (ning) ning.classList.remove('selected');
        }
        el.classList.toggle('selected');
        const esOtro = Array.from(el.parentElement.children).some(c => c.innerText === "Otro" && c.classList.contains('selected'));
        document.getElementById(inputId).style.display = esOtro ? 'block' : 'none';
    }

    function previsualizar(input) {
        const file = input.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                fotoBase64 = e.target.result; fotoNombre = file.name; fotoMime = file.type;
                document.getElementById('imgPreview').src = e.target.result;
                document.getElementById('imgPreview').style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
    }

    async function enviarSolicitud() {
        if (!document.getElementById('aceptaTerminos').checked) return alert("Acepte los términos.");
        const btn = document.getElementById('btnEnviar');
        btn.textContent = 'Enviando...'; btn.disabled = true;

        const getChips = (selector, inputId) => {
            let res = Array.from(document.querySelectorAll(selector + ' .selected')).map(c => c.innerText).filter(t => t !== "Otro").join(', ');
            if (document.getElementById(inputId).style.display === 'block') res += (res ? ", " : "") + document.getElementById(inputId).value;
            return res || "Ninguna";
        };

        const adherentes = Array.from(document.querySelectorAll('.adherente-card')).map(card => ({
            dni: card.querySelector('.adh-dni').value,
            fnac: card.querySelector('.adh-fnac').value,
            apellido: card.querySelector('.adh-apellido').value,
            nombre: card.querySelector('.adh-nombre').value,
            tel: card.querySelector('.adh-tel').value,
            mail: card.querySelector('.adh-mail').value,
            os: card.querySelector('.adh-os').value,
            salud: card.querySelector('.adh-salud').value
        }));

        const d = new URLSearchParams();
        d.append('id_vendedor', document.getElementById('idVendedor').value);
        d.append('tipo_afiliacion', document.getElementById('tipoAfiliacion').value);
        d.append('dni', document.getElementById('dniInput').value);
        d.append('apellido', document.getElementById('apellido').value);
        d.append('nombre', document.getElementById('nombre').value);
        d.append('fecha_nacimiento', document.getElementById('fechaNac').value);
        d.append('domicilio', document.getElementById('domicilio').value);
        d.append('localidad', document.getElementById('localidad').value);
        d.append('cp', document.getElementById('cp').value);
        d.append('celular', document.getElementById('celular').value);
        d.append('mail', document.getElementById('email').value);
        d.append('obra_social', document.getElementById('obraSocial').value);
        d.append('medicacion', document.getElementById('tomaMed').value === 'Sí' ? document.getElementById('medE').value : 'No');
        d.append('internacion', document.getElementById('tuvoInt').value === 'Sí' ? document.getElementById('intE').value : 'No');
        d.append('alergia', getChips('#alergiaChips', 'otroAlergia'));
        d.append('enfermedad_cronica', getChips('#cronicaChips', 'otroCronica'));
        d.append('plan', document.getElementById('plan').value);
        d.append('pago', document.getElementById('pago').value);
        d.append('observaciones', document.getElementById('observacionesInput').value);
        d.append('fotoData', fotoBase64);
        d.append('fotoNombre', fotoNombre);
        d.append('fotoMime', fotoMime);
        d.append('fecha_envio', new Date().toLocaleString());
        d.append('adherentes', JSON.stringify(adherentes));

        const scriptURL = 'https://script.google.com/macros/s/AKfycbxGKg-zZuNWRhsqgF3UzkvTexMDG6-uezpMe_aGAtXt7VWOAKDd9l3-mYZR2f2Bim-t/exec';

        try {
            await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: d });
            document.getElementById('mainForm').classList.add('hidden');
            document.getElementById('success').classList.remove('hidden');
        } catch (e) {
            alert("Error de envío.");
            btn.disabled = false; btn.textContent = 'Enviar Solicitud Final';
        }
    }
</script>
</body>
</html>
