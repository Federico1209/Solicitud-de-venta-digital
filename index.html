<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previnca Salud - Solicitud Digital</title>
    <style>
        :root { --primary: #004a99; --secondary: #00a1e4; --bg: #f4f7f9; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h1 { color: var(--primary); text-align: center; font-size: 22px; }
        .section-title { border-bottom: 2px solid var(--bg); margin: 20px 0 10px; padding-bottom: 5px; font-weight: bold; color: #555; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #333; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        .btn-submit { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        .btn-submit:hover { background: var(--secondary); }
        #successScreen { display: none; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div id="formContent">
        <h1>Solicitud de Afiliación Previnca</h1>
        
        <div class="section-title">Datos Personales</div>
        <div class="form-group">
            <label>DNI</label>
            <input type="number" id="dni" required>
        </div>
        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label>Apellido</label>
                <input type="text" id="apellido" required>
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Nombre</label>
                <input type="text" id="nombre" required>
            </div>
        </div>
        <div class="form-group">
            <label>Fecha de Nacimiento</label>
            <input type="date" id="fechaNac">
        </div>

        <div class="section-title">Contacto y Domicilio</div>
        <div class="form-group">
            <label>Domicilio</label>
            <input type="text" id="domicilio">
        </div>
        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 2;">
                <label>Localidad</label>
                <input type="text" id="localidad">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Cód. Postal</label>
                <input type="text" id="cp">
            </div>
        </div>
        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label>Celular</label>
                <input type="tel" id="celular">
            </div>
            <div class="form-group" style="flex: 1;">
                <label>Email</label>
                <input type="email" id="email">
            </div>
        </div>

        <div class="section-title">Plan y Cobertura</div>
        <div class="form-group">
            <label>Obra Social Actual</label>
            <input type="text" id="obraSocial" placeholder="Si no tiene, poner 'Ninguna'">
        </div>
        <div class="form-group">
            <label>Plan a contratar</label>
            <select id="plan">
                <option value="Plan Global">Plan Global</option>
                <option value="Plan Vital">Plan Vital</option>
                <option value="Plan Integral">Plan Integral</option>
            </select>
        </div>

        <button type="button" class="btn-submit" onclick="submitForm()">Enviar a ZOHO CRM +</button>
    </div>

    <div id="successScreen">
        <h2 style="color: #28a745;">¡Solicitud Enviada con Éxito!</h2>
        <p>Los datos han sido registrados en el sistema.</p>
        <button onclick="location.reload()" style="background: none; border: 1px solid #ccc; padding: 10px; cursor: pointer;">Enviar otra respuesta</button>
    </div>
</div>

<script>
    function submitForm() {
        const btn = document.querySelector('.btn-submit');
        btn.textContent = 'Procesando...';
        btn.disabled = true;

        const formData = new URLSearchParams();
        formData.append('dni', document.getElementById('dni').value);
        formData.append('apellido', document.getElementById('apellido').value);
        formData.append('nombre', document.getElementById('nombre').value);
        formData.append('fecha_nacimiento', document.getElementById('fechaNac').value);
        formData.append('domicilio', document.getElementById('domicilio').value);
        formData.append('localidad', document.getElementById('localidad').value);
        formData.append('codigo_postal', document.getElementById('cp').value);
        formData.append('celular', document.getElementById('celular').value);
        formData.append('mail', document.getElementById('email').value);
        formData.append('obra_social', document.getElementById('obraSocial').value);
        formData.append('plan', document.getElementById('plan').value);

        // Tu URL de Google Apps Script
        const scriptURL = 'https://script.google.com/macros/s/AKfycbyRD80bHzltVeqp8k17tacqqVcB4E1MOG9da6jxUf8/exec';

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: formData
        })
        .then(() => {
            document.getElementById('formContent').style.display = 'none';
            document.getElementById('successScreen').style.display = 'block';
        })
        .catch(error => {
            console.error('Error!', error);
            alert('Error al enviar. Revisa tu conexión.');
            btn.disabled = false;
            btn.textContent = 'Enviar a ZOHO CRM +';
        });
    }
</script>

</body>
</html>
