<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud Digital - Previnca Salud</title>
    <style>
        :root { --primary-blue: #004581; --accent-green: #28a745; --text-white: #ffffff; --bg-body: #e9ecef; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-body); margin: 0; padding: 20px; }
        .container { background: white; max-width: 650px; margin: auto; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header { text-align: center; padding: 25px; background: white; }
        .header h1 { color: var(--primary-blue); margin: 0; font-size: 28px; text-transform: uppercase; }
        .bloque-azul { background-color: var(--primary-blue); color: var(--text-white); padding: 25px; margin: 15px; border-radius: 12px; }
        .bloque-titulo { font-size: 16px; font-weight: bold; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; text-transform: uppercase; }
        .sub-punto { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.2); }
        .sub-titulo { font-size: 13px; font-weight: bold; color: #ffcc00; display: block; margin-bottom: 10px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 11px; font-weight: 600; margin-bottom: 5px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 15px; box-sizing: border-box; background: white; color: #333; }
        textarea { height: 80px; resize: none; font-family: inherit; }
        .chip-group { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .chip { padding: 10px 18px; border: 1px solid rgba(255,255,255,0.4); border-radius: 20px; cursor: pointer; font-size: 13px; background: rgba(255,255,255,0.1); transition: 0.3s; user-select: none; }
        .chip.selected { background: var(--accent-green) !important; color: white !important; font-weight: bold; }
        .input-extra { margin-top: 10px; display: none; background: #fff; color: #333; }
        .btn-verde { background-color: var(--accent-green); color: white; border: none; padding: 20px; width: calc(100% - 30px); margin: 0 15px 20px 15px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-geo { background: white; color: var(--primary-blue); border: none; border-radius: 8px; padding: 0 10px; cursor: pointer; font-size: 18px; height: 45px; }
        .hidden { display: none; }
        .preview-img { width: 100%; max-height: 200px; object-fit: cover; border-radius: 8px; margin-top: 10px; display: none; border: 2px solid white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>PREVINCA SALUD</h1>
        <p>Solicitud de Afiliación Digital</p>
    </div>

    <div id="mainForm">
        <div class="bloque-azul">
            <div class="bloque-titulo">1. Datos Personales</div>
            <div class="form-group">
                <label>ID Vendedor / Promotor *</label>
                <input type="text" id="idVendedor" placeholder="Ingrese su código">
            </div>
            <div class="form-group">
                <label>Tipo de Afiliación</label>
                <select id="tipoAfiliacion">
                    <option value="Solo Titular">Solo Titular</option>
                    <option value="Grupo Familiar">Grupo Familiar</option>
                </select>
            </div>
            <div class="grid">
                <div class="form-group"><label>DNI</label><input type="number" id="dniInput" placeholder="Sin puntos"></div>
                <div class="form-group"><label>Fecha Nacimiento</label><input type="date" id="fechaNac"></div>
            </div>
            <div class="grid">
                <div class="form-group"><label>Apellido</label><input type="text" id="apellido"></div>
                <div class="form-group"><label>Nombre</label><input type="text" id="nombre"></div>
            </div>
            
            <div class="form-group">
                <label>Obra Social / Cobertura Actual</label>
                <input list="obras" id="obraSocial" placeholder="Escriba para buscar o ingrese una nueva">
                <datalist id="obras">
                    <option value="Particular">
                    <option value="PAMI">
                    <option value="IOMA">
                    <option value="OSDE">
                    <option value="Swiss Medical">
                    <option value="OSECAC">
                    <option value="Unión Personal">
                </datalist>
            </div>

            <div class="form-group">
                <label>Dirección (📍 Clic para ubicar)</label>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="domicilio" placeholder="Calle y número">
                    <button type="button" class="btn-geo" onclick="obtenerUbicacion()">📍</button>
                </div>
            </div>
            <div class="grid">
                <div class="form-group"><label>Localidad</label><input type="text" id="localidad"></div>
                <div class="form-group"><label>C.P.</label><input type="text" id="cp"></div>
            </div>
            <div class="grid">
                <div class="form-group"><label>Celular</label><input type="tel" id="celular"></div>
                <div class="form-group"><label>Email</label><input type="email" id="email"></div>
            </div>
        </div>

        <div class="bloque-azul">
            <div class="bloque-titulo">2. Antecedentes de Salud</div>
            <div class="sub-punto">
                <span class="sub-titulo">2.1 Cirugías e Internaciones</span>
                <div class="form-group">
                    <label>¿Tuvo alguna internación o cirugía?</label>
                    <select id="tuvoInternacion" onchange="document.getElementById('intExtra').style.display=(this.value=='Sí'?'block':'none')">
                        <option value="No">No</option><option value="Sí">Sí</option>
                    </select>
                    <input type="text" id="intExtra" class="input-extra" placeholder="¿Cuándo y qué tipo de cirugía?">
                </div>
                <div class="form-group">
                    <label>¿Toma medicación diaria?</label>
                    <select id="tomaMedicacion" onchange="document.getElementById('medExtra').style.display=(this.value=='Sí'?'block':'none')">
                        <option value="No">No</option><option value="Sí">Sí</option>
