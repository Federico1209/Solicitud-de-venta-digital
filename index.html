<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previnca Salud - Afiliación Digital</title>
    <style>
        :root {
            --primary: #004a99;
            --secondary: #00a1e4;
            --light-bg: #f4f7f9;
            --white: #ffffff;
            --text: #333;
            --border: #d1d9e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: var(--white);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h1 {
            color: var(--primary);
            font-size: 24px;
            margin: 0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .btn-submit {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 20px;
        }

        .btn-submit:hover {
            background-color: var(--secondary);
        }

        #successScreen {
            display: none;
            text-align: center;
            padding: 20px;
        }

        #successScreen.show {
            display: block;
        }

        .show-form {
            display: block;
        }

        .hide-form {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        <div id="formContent" class="show-form">
            <div class="header">
                <h1>Solicitud de Afiliación</h1>
                <p>Previnca Salud</p>
            </div>

            <div class="form-group">
                <label>DNI</label>
                <input type="number" id="dni" placeholder="Ej: 30123456">
            </div>

            <div class="form-group">
                <label>Apellido</label>
                <input type="text" id="apellido">
            </div>

            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="nombre">
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email">
            </div>

            <div class="form-group">
                <label>Celular</label>
                <input type="tel" id="celular">
            </div>

            <button type="button" class="btn-submit" onclick="submitForm()">Enviar Solicitud</button>
        </div>

        <div id="successScreen">
            <h2 style="color: green;">¡Solicitud Enviada!</h2>
            <p>Gracias por elegir Previnca Salud. Nos contactaremos a la brevedad.</p>
        </div>
    </div>

    <script>
        function submitForm() {
            const btn = document.querySelector('.btn-submit');
            btn.textContent = 'Enviando...';
            btn.disabled = true;

            const formData = new URLSearchParams();
            formData.append('dni', document.getElementById('dni').value);
            formData.append('apellido', document.getElementById('apellido').value);
            formData.append('nombre', document.getElementById('nombre').value);
            formData.append('mail', document.getElementById('email').value);
            formData.append('celular', document.getElementById('celular').value);

            const scriptURL = 'https://script.google.com/macros/s/AKfycbyRD80bHzltVeqp8k17tacqqVcB4E1MOG9da6jxUf8/exec';

            fetch(scriptURL, {
                method: 'POST',
                mode: 'no-cors',
                body: formData
            })
            .then(() => {
                document.getElementById('formContent').classList.add('hide-form');
                document.getElementById('successScreen').classList.add('show');
            })
            .catch(error => {
                console.error('Error!', error);
                alert('Hubo un error al enviar. Intente nuevamente.');
                btn.disabled = false;
                btn.textContent = 'Enviar Solicitud';
            });
        }
    </script>
</body>
</html>
