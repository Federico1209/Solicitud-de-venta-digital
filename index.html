<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previnca Salud - Afiliación Digital</title>
    <style>
        :root { --red: #e30613; --navy: #1B3A6B; --blue: #2563EB; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 500px; border-top: 8px solid var(--red); }
        h2 { color: var(--navy); text-align: center; margin-bottom: 30px; font-size: 24px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #666; font-size: 14px; font-weight: 600; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; transition: border 0.3s; }
        input:focus { border-color: var(--blue); outline: none; }
        .btn-submit { width: 100%; padding: 15px; background: var(--blue); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: background 0.3s; }
        .btn-submit:hover { background: #1d4ed8; }
        .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
        #successScreen { display: none; text-align: center; }
        .success-icon { font-size: 50px; color: #22c55e; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="card">
    <div id="stepForm">
        <h2>Solicitud de Afiliación</h2>
        <div class="form-group">
            <label>DNI</label>
            <input type="number" id="dni" placeholder="Ej: 30123456">
        </div>
        <div class="form-group">
            <label>APELLIDO</label>
            <input type="text" id="apellido" placeholder="García">
        </div>
        <div class="form-group">
            <label>NOMBRE</label>
            <input type="text" id="nombre" placeholder="Juan">
        </div>
        <div class="form-group">
            <label>FECHA DE NACIMIENTO</label>
            <input type="date" id="fechaNac">
        </div>
        <div class="form-group">
            <label>CELULAR</label>
            <input type="tel" id="celular" placeholder="341 1234567">
        </div>
        <div class="form-group">
            <label>PLAN</label>
            <select id="plan">
                <option value="">Seleccione un plan</option>
                <option value="Individual">Individual</option>
                <option value="Familiar">Familiar</option>
            </select>
        </div>
        <button type="button" class="btn-submit" onclick="enviarDatos()">ENVIAR A ZOHO CRM ⚡</button>
    </div>

    <div id="successScreen">
        <div class="success-icon">✅</div>
        <h2 style="color: #22c55e;">¡Enviado con éxito!</h2>
        <p>Los datos ya se encuentran en Google Sheets.</p>
        <button onclick="location.reload()" style="background: var(--navy); color: white; padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;">Cargar otro</button>
    </div>
</div>

<script>
async function enviarDatos() {
    const btn = document.querySelector('.btn-submit');
    const originalText = btn.textContent;
    
    // Validación simple
    if(!document.getElementById('dni').value) { alert('Por favor, completa el DNI'); return; }

    btn.textContent = 'Procesando...';
    btn.disabled = true;

    const scriptURL = 'https://script.google.com/macros/s/AKfycbyRD80bHzltVeqp8k17tacqqVcB4E1MOG9da6jxUf8/exec';

    const payload = new URLSearchParams();
    payload.append('dni', document.getElementById('dni').value);
    payload.append('apellido', document.getElementById('apellido').value);
    payload.append('nombre', document.getElementById('nombre').value);
    payload.append('fecha_nacimiento', document.getElementById('fechaNac').value);
    payload.append('celular', document.getElementById('celular').value);
    payload.append('plan', document.getElementById('plan').value);
    payload.append('observaciones', 'Enviado desde Formulario Digital');

    try {
        await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: payload });
        // Mostrar pantalla de éxito
        document.getElementById('stepForm').style.display = 'none';
        document.getElementById('successScreen').style.display = 'block';
    } catch (error) {
        console.error('Error:', error);
        alert('Hubo un error al enviar. Reintente.');
        btn.textContent = originalText;
        btn.disabled = false;
    }
}
</script>

</body>
</html>
