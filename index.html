<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solicitud de Afiliación · Previnca Salud</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #1B3A6B; --blue: #2563EB; --lblue: #EFF6FF; --teal: #0F766E;
            --lteal: #F0FDFA; --orange: #EA580C; --lorg: #FFF7ED; --green: #15803D;
            --lgreen: #F0FDF4; --red: #DC2626; --lred: #FEF2F2; --white: #FFFFFF;
            --gray50: #F8FAFC; --gray100: #F1F5F9; --gray200: #E2E8F0; --gray400: #94A3B8;
            --gray600: #475569; --gray800: #1E293B; --radius: 14px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'DM Sans', sans-serif; background: linear-gradient(160deg, #0F2557 0%, #1B3A6B 45%, #0F4C81 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-bottom: 40px; }
        .app-header { width: 100%; max-width: 480px; padding: 28px 24px 0; display: flex; align-items: center; justify-content: space-between; }
        .logo-area { display: flex; align-items: center; gap: 10px; color: white; }
        .card { width: 100%; max-width: 480px; background: var(--white); border-radius: 24px; margin-top: 24px; padding: 28px 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.16); }
        .field { margin-bottom: 18px; }
        label { display: block; font-size: 12px; font-weight: 600; color: var(--gray600); margin-bottom: 6px; text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 13px; border: 1.5px solid var(--gray200); border-radius: var(--radius); background: var(--gray50); outline: none; }
        .btn-submit { width: 100%; padding: 15px; background: linear-gradient(135deg, var(--teal), var(--green)); color: white; border: none; border-radius: var(--radius); font-weight: 700; cursor: pointer; margin-top: 20px; }
        .success-screen { display: none; text-align: center; }
        .success-screen.show { display: block; }
    </style>
</head>
<body>

<header class="app-header">
    <div class="logo-area"><strong>Previnca Salud</strong></div>
</header>

<div class="card">
    <div id="formContent">
        <h2 style="margin-bottom: 20px; color: var(--navy);">Datos del Titular</h2>
        
        <div class="field">
            <label>DNI</label>
            <input type="number" id="dni" required>
        </div>
        <div class="field">
            <label>Apellido</label>
            <input type="text" id="apellido" required>
        </div>
        <div class="field">
            <label>Nombre</label>
            <input type="text" id="nombre" required>
        </div>
        <div class="field">
            <label>Fecha de Nacimiento</label>
            <input type="date" id="fechaNac" required>
        </div>
        <div class="field">
            <label>Domicilio</label>
            <input type="text" id="domicilio" required>
        </div>
        <div class="field">
            <label>Localidad</label>
            <input type="text" id="localidad" required>
        </div>
        <div class="field">
            <label>Código Postal</label>
            <input type="number" id="cp" required>
        </div>
        <div class="field">
            <label>Celular</label>
            <input type="tel" id="celular" required>
        </div>
        <div class="field">
            <label>Email</label>
            <input type="email" id="email">
        </div>
        <div class="field">
            <label>Plan</label>
            <select id="plan">
                <option value="Individual A">Individual A</option>
                <option value="Familiar A">Familiar A</option>
            </select>
        </div>

        <button type="button" class="btn-submit" onclick="submitForm()">Enviar a ZOHO CRM ⚡</button>
    </div>

    <div id="successScreen" class="success-screen">
        <h2 style="color: var(--green);">¡Solicitud Enviada!</h2>
        <p style="margin-top: 10px; color: var(--gray600);">Los datos han sido registrados en Google Sheets.</p>
        <button onclick="location.reload()" style="margin-top: 20px; padding: 10px; border: none; background: var(--navy); color: white; border-radius: 8px;">Nueva Solicitud</button>
    </div>
</div>

<script>
    function submitForm() {
        const btn = document.querySelector('.btn-submit');
        btn.textContent = 'Enviando...';
        btn.disabled = true;

        const formData = new URLSearchParams();
        formData.append('dni', document.getElementById('dni').value);
        formData.append('apellido', document.getElementById('apellido').value);
        formData.append('nombre', document.getElementById('nombre').value);
        formData.append('fecha_nacimiento', document.getElementById('fechaNac').value);
        formData.append('domicilio', document.getElementById('domicilio').value);
        formData.append('localidad', document.getElementById('localidad').value);
        formData.append('codigo_postal', document.getElementById('cp').value);
        formData.append('celular', document.getElementById('celular').value);
        formData.append('mail', document.getElementById('email').value);
        formData.append('plan', document.getElementById('plan').value);

        const scriptURL = 'https://script.google.com/macros/s/AKfycbyRD80bHzltVeqp8k17tacqqVcB4E1MOG9da6jxUf8/exec';

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: formData
        })
        .then(() => {
            document.getElementById('formContent').style.display = 'none';
            document.getElementById('successScreen').classList.add('show');
        })
        .catch(error => {
            alert('Error al enviar');
            btn.disabled = false;
            btn.textContent = 'Enviar a ZOHO CRM ⚡';
        });
    }
</script>

</body>
</html>
