<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud de Venta Digital</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 20px auto; padding: 20px; line-height: 1.6; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #0070f3; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background-color: #0051bb; }
        h2 { color: #333; text-align: center; }
    </style>
</head>
<body>

    <h2>Formulario de Solicitud</h2>

    <form action="TU_URL_DE_APPS_SCRIPT" method="POST">
        
        <div class="form-group">
            <label>DNI</label>
            <input type="text" name="dni" required>
        </div>

        <div class="form-group">
            <label>Apellido</label>
            <input type="text" name="apellido" required>
        </div>

        <div class="form-group">
            <label>Nombre</label>
            <input type="text" name="nombre" required>
        </div>

        <div class="form-group">
            <label>Fecha de Nacimiento</label>
            <input type="date" name="fecha_nacimiento" required>
        </div>

        <div class="form-group">
            <label>Domicilio</label>
            <input type="text" name="domicilio" required>
        </div>

        <div class="form-group">
            <label>Localidad</label>
            <input type="text" name="localidad" required>
        </div>

        <div class="form-group">
            <label>Código Postal</label>
            <input type="text" name="codigo_postal" required>
        </div>

        <div class="form-group">
            <label>Celular</label>
            <input type="tel" name="celular" required>
        </div>

        <div class="form-group">
            <label>Mail</label>
            <input type="email" name="mail" required>
        </div>

        <div class="form-group">
            <label>Grupo Familiar / Titular</label>
            <input type="text" name="grupo_familiar">
        </div>

        <div class="form-group">
            <label>Obra Social</label>
            <input type="text" name="obra_social">
        </div>

        <div class="form-group">
            <label>Alergia</label>
            <input type="text" name="alergia">
        </div>

        <div class="form-group">
            <label>Enfermedad Crónica</label>
            <input type="text" name="enfermedad_cronica">
        </div>

        <div class="form-group">
            <label>Plan</label>
            <input type="text" name="plan">
        </div>

        <div class="form-group">
            <label>Modalidad de Pago</label>
            <select name="modalidad_pago">
                <option value="Efectivo">Efectivo</option>
                <option value="Tarjeta">Tarjeta</option>
                <option value="Transferencia">Transferencia</option>
                <option value="Débito Automático">Débito Automático</option>
            </select>
        </div>

        <div class="form-group">
            <label>Vigencia</label>
            <input type="text" name="vigencia">
        </div>

        <div class="form-group">
            <label>Observaciones</label>
            <textarea name="observaciones" rows="3"></textarea>
        </div>

        <button type="submit">Enviar Solicitud</button>
    </form>

</body>
</html>
