<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previnca Salud - Afiliación Digital</title>
    <style>
        :root { --navy: #1B3A6B; --blue: #2563EB; --white: #FFFFFF; }
        body { font-family: sans-serif; background: linear-gradient(160deg, #0F2557 0%, #1B3A6B 100%); color: var(--white); display: flex; justify-content: center; padding: 20px; min-height: 100vh; }
        .card { background: var(--white); color: #333; padding: 30px; border-radius: 24px; width: 100%; max-width: 480px; box-shadow: 0 12px 40px rgba(0,0,0,0.2); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1.5px solid #E2E8F0; border-radius: 12px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 15px; background: var(--blue); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div id="stepForm">
        <h2 style="color: var(--navy); text-align: center;">Datos del Titular</h2>
        <input type="number" id="dni" placeholder="DNI (Ej: 30456789)">
        <input type="text" id="apellido" placeholder="Apellido">
        <input type="text" id="nombre" placeholder="Nombre">
        <label style="font-size: 12px; color: #666;">Fecha de Nacimiento</label>
        <input type="date" id="fechaNac">
        <input type="text" id="domicilio" placeholder="Domicilio">
        <input type="text" id="localidad" placeholder="Localidad">
        <input type="number" id="cp" placeholder="Código Postal">
        <input type="tel" id="celular" placeholder="Celular">
        <input type="email" id="email" placeholder="Email (Opcional)">
        
        <select id="plan">
            <option value="">Seleccioná un Plan</option>
            <option value="IND-A">Individual A</option>
            <option value="IND-B">Individual B</option>
            <option value="FAM-A">Familiar A</option>
        </select>

        <button type="button" class="btn-submit" onclick="enviarDatos()">Enviar a ZOHO CRM ⚡</button>
    </div>

    <div id="successScreen" style="display:none; text-align: center;">
        <h2 style="color: #15803D;">✅ ¡Solicitud Enviada!</h2>
        <p>Los datos se han registrado correctamente en Google Sheets.</p>
        <button onclick="location.reload()" style="margin-top:20px; background: var(--navy); color: white; padding: 10px; border-radius: 8px; border: none; cursor: pointer;">Nueva Solicitud</button>
    </div>
</div>

<script>
async function enviarDatos() {
    const btn = document.querySelector('.btn-submit');
    const originalText = btn.textContent;
    btn.textContent = 'Enviando...';
    btn.disabled = true;

    const scriptURL = 'https://script.google.com/macros/s/AKfycbyRD80bHzltVeqp8k17tacqqVcB4E1MOG9da6jxUf8/exec';

    const payload = new URLSearchParams();
    payload.append('dni', document.getElementById('dni').value);
    payload.append('apellido', document.getElementById('apellido').value);
    payload.append('nombre', document.getElementById('nombre').value);
    payload.append('fecha_nacimiento', document.getElementById('fechaNac').value);
    payload.append('domicilio', document.getElementById('domicilio').value);
    payload.append('localidad', document.getElementById('localidad').value);
    payload.append('codigo_postal', document.getElementById('cp').value);
    payload.append('celular', document.getElementById('celular').value);
    payload.append('mail', document.getElementById('email').value);
    payload.append('plan', document.getElementById('plan').value);

    try {
        await fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: payload });
        document.getElementById('stepForm').style.display = 'none';
        document.getElementById('successScreen').style.display = 'block';
    } catch (error) {
        alert('Error al conectar con la planilla.');
        btn.textContent = originalText;
        btn.disabled = false;
    }
}
</script>
</body>
</html>
